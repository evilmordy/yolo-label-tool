name: Build & Release YOLOTxtMaker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and build
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pyinstaller main.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/YOLOTxtMaker.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libxkbcommon-x11-0 libdbus-1-3 libfuse2 imagemagick

      - name: Install dependencies and build
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pyinstaller main.spec

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          chmod +x dist/YOLOTxtMaker

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/YOLOTxtMaker AppDir/usr/bin/YOLOTxtMaker

          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=YOLOTxtMaker' \
            'Exec=YOLOTxtMaker' \
            'Icon=YOLOTxtMaker' \
            'Categories=Graphics;' \
            'Terminal=false' \
            > AppDir/YOLOTxtMaker.desktop

          cp AppDir/YOLOTxtMaker.desktop AppDir/usr/share/applications/
          cp AppDir/YOLOTxtMaker.desktop AppDir/

          convert -size 256x256 xc:'#0ea5e9' AppDir/YOLOTxtMaker.png
          cp AppDir/YOLOTxtMaker.png AppDir/usr/share/icons/hicolor/256x256/apps/

          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir YOLOTxtMaker.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: YOLOTxtMaker.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and build
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pyinstaller main.spec

      - name: Package macOS app
        run: |
          ditto -c -k --keepParent dist/YOLOTxtMaker.app YOLOTxtMaker-mac.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: YOLOTxtMaker-mac.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/YOLOTxtMaker.exe
            artifacts/YOLOTxtMaker.AppImage
            artifacts/YOLOTxtMaker-mac.zip
